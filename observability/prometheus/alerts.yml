groups:
  - name: pixrail
    rules:
      - alert: PixRailHighErrorRate
        expr: sum(rate(pixrail_http_requests_total{status=~"5.."}[5m])) > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: PixRail 5xx rate is elevated.
      - alert: PixRailRateLimitSurge
        expr: sum(rate(pixrail_http_requests_total{status="429"}[5m])) > 10
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: PixRail is rejecting traffic due to rate limits.
