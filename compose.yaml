services:
  api:
    build: .
    environment:
      PIXRAIL_ENV: development
      PIXRAIL_HTTP_ADDR: :8080
      PIXRAIL_API_KEYS: tenant_demo:dev-secret
      PIXRAIL_STORE_DRIVER: postgres
      PIXRAIL_DATABASE_URL: postgres://pixrail:pixrail@postgres:5432/pixrail?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
  migrate:
    image: golang:1.25-alpine
    working_dir: /src
    command: go run ./cmd/pixrail-migrate
    environment:
      PIXRAIL_DATABASE_URL: postgres://pixrail:pixrail@postgres:5432/pixrail?sslmode=disable
    volumes:
      - .:/src
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pixrail
      POSTGRES_PASSWORD: pixrail
      POSTGRES_DB: pixrail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixrail -d pixrail"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
