services:
  api:
    build: .
    environment:
      PIXRAIL_ENV: development
      PIXRAIL_HTTP_ADDR: :8080
      PIXRAIL_API_KEYS: tenant_demo:dev-secret:tenant,tenant_demo:worker-secret:worker,tenant_demo:risk-secret:risk,tenant_demo:provider-secret:provider
      PIXRAIL_STORE_DRIVER: postgres
      PIXRAIL_DATABASE_URL: postgres://pixrail:pixrail@postgres:5432/pixrail?sslmode=disable
      PIXRAIL_TRACING_EXPORTER: none
    ports:
      - "${PIXRAIL_HTTP_PORT:-18080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
  worker:
    build: .
    entrypoint: ["/pixrail-worker"]
    environment:
      PIXRAIL_ENV: development
      PIXRAIL_API_KEYS: tenant_demo:dev-secret:tenant,tenant_demo:worker-secret:worker,tenant_demo:risk-secret:risk,tenant_demo:provider-secret:provider
      PIXRAIL_STORE_DRIVER: postgres
      PIXRAIL_DATABASE_URL: postgres://pixrail:pixrail@postgres:5432/pixrail?sslmode=disable
      PIXRAIL_TRACING_EXPORTER: none
      PIXRAIL_WORKER_BATCH_SIZE: 100
      PIXRAIL_WORKER_INTERVAL: 1s
    depends_on:
      migrate:
        condition: service_completed_successfully
  migrate:
    image: golang:1.25-alpine
    working_dir: /src
    command: go run ./cmd/pixrail-migrate
    environment:
      PIXRAIL_DATABASE_URL: postgres://pixrail:pixrail@postgres:5432/pixrail?sslmode=disable
    volumes:
      - .:/src
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pixrail
      POSTGRES_PASSWORD: pixrail
      POSTGRES_DB: pixrail
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixrail -d pixrail"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${PIXRAIL_POSTGRES_PORT:-15432}:5432"
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PIXRAIL_PROMETHEUS_PORT:-19090}:9090"
    depends_on:
      - api
