services:
  api:
    build: .
    environment:
      PIXRAIL_ENV: development
      PIXRAIL_HTTP_ADDR: :8080
      PIXRAIL_API_KEYS: tenant_demo:dev-secret
    ports:
      - "8080:8080"
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
